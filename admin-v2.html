<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cab'sWay Admin V2</title>

    <link rel="stylesheet" href="css/admin-v2.css">
</head>

<body>

<div class="sidebar">

    <div class="logo">
        🚖 Cab'sWay
    </div>

    <ul>

        <li class="active">🏠 Dashboard</li>

        <li>🚖 Trips</li>

        <li>🎫 Bookings</li>

        <li>👥 Customers</li>

        <li>🚗 Fleet</li>

        <li>📊 Reports</li>

        <li>⚙ Settings</li>

        <li>🚪 Logout</li>

    </ul>

</div>

<div class="main">

<header>

<h2>Dashboard</h2>

<div class="admin">

Administrator

</div>

</header>

<div class="cards">

<div class="card">

<h3>Revenue Today</h3>

<h1>₹0</h1>

</div>

<div class="card">

<h3>Trips Today</h3>

<h1>0</h1>

</div>

<div class="card">

<h3>Bookings</h3>

<h1>0</h1>

</div>

<div class="card">

<h3>Seats Left</h3>

<h1>0</h1>

</div>

</div>

<h2 class="title">

Today's Trips

</h2>

<div id="tripContainer">

<div class="trip-card">

<h3>🚗 No Trips Yet</h3>

<p>Create your first trip.</p>

<button>Add Trip</button>

</div>

</div>

</div>

<script src="js/admin-v2.js"></script>

</body>

</html>
