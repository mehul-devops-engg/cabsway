<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | CabsWay</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="../images/favicon.ico">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-shell">
  <div class="login-card">
    <div class="brand" style="color:var(--navy);margin-bottom:18px;"><img src="../images/logo.svg" alt="">CabsWay Admin</div>
    <h3 class="mt-0">Operator Login</h3>
    <p class="text-sm muted">Sign in to manage vehicles, trips, bookings and reports.</p>
    <form id="login-form">
      <div class="field">
        <label for="l-password">Password</label>
        <input type="password" id="l-password" required placeholder="Enter admin password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>
    <p class="text-sm center" style="margin-top:10px;"><a href="../index.html">← Back to website</a></p>
  </div>
</div>

<script src="../js/main.js"></script>
<script src="../js/api.js"></script>
<script src="../js/demo-data.js"></script>
<script>
  // note: reference images/api paths use '../' from within /admin
  CW_CONFIG.API_URL = CW_CONFIG.API_URL; // unchanged, shared config

  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    var password = document.getElementById('l-password').value;
    var result = await cwApiCall('login', { password: password });
    if (result && result.ok) {
      sessionStorage.setItem('cw_admin_session', 'yes');
      location.href = 'dashboard.html';
    } else {
      cwToast('Incorrect password. Try again.');
    }
  });
</script>
</body>
</html>
