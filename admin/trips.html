<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trips | CabsWay Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="../images/favicon.ico">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="brand"><img src="../images/logo.svg" alt="">CabsWay</div>
    <ul class="admin-nav">
      <li><a href="dashboard.html">📊 Dashboard</a></li>
      <li><a href="trips.html">🚖 Trips</a></li>
      <li><a href="bookings.html">🎫 Bookings</a></li>
      <li><a href="fleet.html">🚗 Fleet</a></li>
      <li><a href="reports.html">📈 Reports</a></li>
      <li><a href="settings.html">⚙ Settings</a></li>
      <li class="nav-section">Session</li>
      <li><a href="../index.html">🌐 View Website</a></li>
      <li><a href="#" id="admin-logout">🚪 Log Out</a></li>
    </ul>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <div class="flex gap-8"><button class="admin-menu-toggle">☰</button><strong>Trips</strong></div>
      <button class="btn btn-primary btn-sm" onclick="cwOpenTripModal()">+ New Trip</button>
    </div>

    <div class="admin-content">
      <div class="toolbar">
        <input type="search" id="trip-search" placeholder="Search route, driver, trip ID…">
        <select id="trip-filter-status">
          <option value="">All Status</option>
          <option value="Open">Open</option>
          <option value="Full">Full</option>
          <option value="Completed">Completed</option>
        </select>
        <select id="trip-filter-date">
          <option value="">All Dates</option>
          <option value="today">Today</option>
          <option value="upcoming">Upcoming</option>
        </select>
        <span class="spacer"></span>
        <span class="text-sm muted" id="trip-count"></span>
      </div>

      <div class="table-card">
        <table class="data-table">
          <thead><tr><th>Trip ID</th><th>Route</th><th>Date / Time</th><th>Vehicle</th><th>Driver</th><th>Seats</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="trips-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Create / Edit Trip Modal -->
<div class="modal-backdrop" id="trip-modal">
  <div class="modal">
    <button class="modal-close" onclick="cwCloseModal('trip-modal')">✕</button>
    <h3 id="trip-modal-title">New Trip</h3>
    <form id="trip-form">
      <input type="hidden" id="t-tripId">
      <div class="form-row">
        <div class="field"><label for="t-pickup">Pickup</label><input type="text" id="t-pickup" required></div>
        <div class="field"><label for="t-drop">Drop</label><input type="text" id="t-drop" required></div>
      </div>
      <div class="form-row">
        <div class="field"><label for="t-date">Date</label><input type="date" id="t-date" required></div>
        <div class="field"><label for="t-time">Time</label><input type="time" id="t-time" required></div>
      </div>
      <div class="form-row">
        <div class="field">
          <label for="t-carId">Vehicle</label>
          <select id="t-carId" required></select>
        </div>
        <div class="field"><label for="t-totalSeats">Total Seats</label><input type="number" id="t-totalSeats" min="1" required></div>
      </div>
      <div class="field">
        <label for="t-driverName">Driver Name (entered manually)</label>
        <input type="text" id="t-driverName" required placeholder="e.g. Ramesh Yadav">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Save Trip</button>
    </form>
  </div>
</div>

<script src="../js/main.js"></script>
<script src="../js/api.js"></script>
<script src="../js/demo-data.js"></script>
<script src="../js/admin-common.js"></script>
<script src="../js/admin-trips.js"></script>
</body>
</html>
