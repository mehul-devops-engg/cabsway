<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cab'sWay — Bookings (Owner)</title>
<meta name="robots" content="noindex, nofollow">

<!--
  ============================= OWNER NOTES =============================
  This page is NOT linked anywhere obvious on the main site (just a small
  "Owner" link in the footer). Bookmark this page directly:
      yourdomain.in/admin.html

  HOW IT WORKS:
  - Everything is saved in THIS browser only (localStorage), on THIS device.
    If you open it on a different phone, it starts empty on that phone.
  - There's a simple 4-digit PIN lock so a random visitor who finds the
    link can't see your bookings. This is NOT real security (anyone who
    reads this file's code can see the PIN) — it's just a casual lock.
    Change ADMIN_PIN below to your own 4 digits before publishing.
  =========================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="lockScreen">
  <div class="lock-box">
    <h1>Cab'sWay</h1>
    <p>Owner Login</p>

<div class="field">
<label>Username</label>
<input
id="username"
type="text"
placeholder="Username">
</div>

<div class="field">
<label>Password</label>
<input
id="password"
type="password"
placeholder="Password">
</div>

<button
id="unlockBtn"
onclick="login()">
Login
</button>
    <div id="loginError" style="display:none;">
    Wrong username or password.
</div>
  </div>
</div>

<div id="dashboard">
  <header>
    <div class="wrap header-inner">
      <div class="brand">Cab'sWay<span>.</span> — Bookings</div>
      <button class="lock-again" onclick="lockAgain()">Lock</button>
    </div>
  </header>

  <div class="wrap">
    <section>
      <div class="date-row">
        <input type="date" id="dateInput">
        <button class="today-btn" onclick="goToday()">Today</button>
        <div class="summary" id="summaryText"></div>
      </div>

      <div class="car-grid" id="carGrid"></div>

      <div id="bookForm">
        <h3 id="bookFormTitle">Mark car as booked</h3>
        <div class="field">
    <label>Customer Name</label>
    <input id="bfName" type="text">
</div>

<div class="field">
    <label>Phone</label>
    <input id="bfPhone" type="tel">
</div>

<div class="field">
    <label>Pickup</label>
    <input id="bfPickup" type="text">
</div>

<div class="field">
    <label>Destination</label>
    <input id="bfDestination" type="text">
</div>

<div class="field">
    <label>Seats Required</label>
    <input id="bfSeats" type="number" min="1" value="1">
</div>

<div class="field">
    <label>Total Fare (₹)</label>
    <input id="bfFare" type="number" min="0">
</div>

<div class="field">
    <label>Advance Paid (₹)</label>
    <input id="bfAdvance" type="number" min="0" value="0" oninput="calculateBalance()">
</div>

<div class="field">
    <label>Balance (₹)</label>
    <input id="bfBalance" type="number" readonly>
</div>

<div class="field">
    <label>Payment Status</label>
    <select id="bfPayment">
        <option>Pending</option>
        <option>Partial</option>
        <option>Paid</option>
    </select>
</div>

<div class="field">
    <label>Notes</label>
    <textarea id="bfNotes"></textarea>
</div>
          <button class="btn-save" onclick="saveBooking()">Save &amp; mark booked</button>
          <button class="btn-cancel" onclick="closeBookForm()">Cancel</button>
        </div>
      </div>
    </section>

    <section class="log-section">
      <h2>Recent activity</h2>
      <button onclick="exportCsv()" style="margin-bottom:14px; padding:8px 16px; border-radius:8px; border:1px solid var(--line); background:var(--paper); font-weight:600; font-size:0.85rem; cursor:pointer;">⬇ Export as CSV</button>
      <div id="logList"></div>
    </section>
  </div>
</div>

<script src="admin.js"></script>

</body>
</html>
