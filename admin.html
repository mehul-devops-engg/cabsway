<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cab'sWay — Bookings (Owner)</title>
<meta name="robots" content="noindex, nofollow">

<!--
  ============================= OWNER NOTES =============================
  This page is NOT linked anywhere obvious on the main site (just a small
  "Owner" link in the footer). Bookmark this page directly:
      yourdomain.in/admin.html

  HOW IT WORKS:
  - Everything is saved in THIS browser only (localStorage), on THIS device.
    If you open it on a different phone, it starts empty on that phone.
  - There's a simple 4-digit PIN lock so a random visitor who finds the
    link can't see your bookings. This is NOT real security (anyone who
    reads this file's code can see the PIN) — it's just a casual lock.
    Change ADMIN_PIN below to your own 4 digits before publishing.
  =========================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="admin.css">
</head>
<body>

<div id="lockScreen">
  <div class="lock-box">
    <h1>Cab'sWay</h1>
    <p>Owner Login</p>

<div class="field">
<label>Username</label>
<input
id="username"
type="text"
placeholder="Username">
</div>

<div class="field">
<label>Password</label>
<input
id="password"
type="password"
placeholder="Password">
</div>

<button
id="unlockBtn"
onclick="login()">
Login
</button>
    <div id="loginError" style="display:none;">
    Wrong username or password.
</div>
  </div>
</div>

<div id="dashboard">
  <header>
    <div class="wrap header-inner">
      <div class="brand">Cab'sWay<span>.</span> — Bookings</div>
      <button class="lock-again" onclick="lockAgain()">Lock</button>
    </div>
  </header>

  <div class="wrap">
    <section>
      <div class="date-row">
        <input type="date" id="dateInput">
        <button class="today-btn" onclick="goToday()">Today</button>
        <div class="summary" id="summaryText"></div>
      </div>

      <div class="car-grid" id="carGrid"></div>

      <div id="bookForm">
        <h3 id="bookFormTitle">Mark car as booked</h3>
        <div class="field"><label for="bfName">Customer name</label><input id="bfName" type="text"></div>
        <div class="field"><label for="bfPhone">Customer phone</label><input id="bfPhone" type="text"></div>
        <div class="field"><label for="bfRoute">Route</label><input id="bfRoute" type="text" placeholder="e.g. Nashik → Pune"></div>
        <div class="field"><label for="bfNotes">Notes (optional)</label><textarea id="bfNotes" rows="2"></textarea></div>
        <div class="form-btns">
          <button class="btn-save" onclick="saveBooking()">Save &amp; mark booked</button>
          <button class="btn-cancel" onclick="closeBookForm()">Cancel</button>
        </div>
      </div>
    </section>

    <section class="log-section">
      <h2>Recent activity</h2>
      <button onclick="exportCsv()" style="margin-bottom:14px; padding:8px 16px; border-radius:8px; border:1px solid var(--line); background:var(--paper); font-weight:600; font-size:0.85rem; cursor:pointer;">⬇ Export as CSV</button>
      <div id="logList"></div>
    </section>
  </div>
</div>

<script src="js/admin.js"></script>

</body>
</html>
