<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | CabsWay Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="../images/favicon.ico">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-body">
<div class="admin-shell">

  <aside class="admin-sidebar">
    <div class="brand"><img src="../images/logo.svg" alt="">CabsWay</div>
    <ul class="admin-nav">
      <li><a href="dashboard.html">📊 Dashboard</a></li>
      <li><a href="trips.html">🚖 Trips</a></li>
      <li><a href="bookings.html">🎫 Bookings</a></li>
      <li><a href="fleet.html">🚗 Fleet</a></li>
      <li><a href="reports.html">📈 Reports</a></li>
      <li><a href="settings.html">⚙ Settings</a></li>
      <li class="nav-section">Session</li>
      <li><a href="../index.html">🌐 View Website</a></li>
      <li><a href="#" id="admin-logout">🚪 Log Out</a></li>
    </ul>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <div class="flex gap-8"><button class="admin-menu-toggle">☰</button><strong>Dashboard</strong></div>
      <div class="text-sm muted" id="today-label"></div>
    </div>

    <div class="admin-content">
      <div class="grid grid-4" id="quick-cards"></div>

      <div class="grid grid-2" style="margin-top:26px;align-items:start;">
        <div class="table-card" style="padding:20px;">
          <h3 class="mt-0">Today's Trips</h3>
          <table class="data-table">
            <thead><tr><th>Trip</th><th>Route</th><th>Time</th><th>Seats</th><th>Status</th></tr></thead>
            <tbody id="today-trips-body"></tbody>
          </table>
        </div>
        <div class="table-card" style="padding:20px;">
          <h3 class="mt-0">Recent Activity</h3>
          <div id="recent-activity"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../js/main.js"></script>
<script src="../js/api.js"></script>
<script src="../js/demo-data.js"></script>
<script src="../js/admin-common.js"></script>
<script src="../js/admin-dashboard.js"></script>
</body>
</html>
