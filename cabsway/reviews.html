<main id="main">
<section class="section-tight" style="padding-top:40px;">

    <h1>4.8★ from travellers on the road</h1>
  </div>
</section>

<script src="js/main.js"></script>
<script src="js/api.js"></script>
<script src="js/demo-data.js"></script>
<script>
  (async function () {
    var reviews = await cwApiCall('getReviews');
    var grid = document.getElementById('reviews-grid');
    grid.innerHTML = reviews.map(function (r) {
      var stars = '★★★★★☆☆☆☆☆'.slice(5 - r.rating, 10 - r.rating);
      return (
        '<div class="card feature-card reveal in">' +
          '<div style="color:var(--marigold);letter-spacing:2px;">' + stars + '</div>' +
          '<p style="margin-top:10px;">“' + r.text + '”</p>' +
          '<p class="text-sm muted" style="margin:0;"><strong>' + r.name + '</strong> · ' + r.route + '</p>' +
        '</div>'
      );
    }).join('');
  })();
</script>
</body>
